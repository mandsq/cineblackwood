<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CineVault — Sua Biblioteca de Vídeos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --card: #1a1a24;
      --border: #2a2a38;
      --accent: #e8c84a;
      --accent2: #ff6b35;
      --text: #f0f0f8;
      --muted: #888899;
      --overlay: rgba(10,10,15,0.92);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ─── HEADER ─── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10,10,15,0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      letter-spacing: 2px;
      color: var(--accent);
      text-shadow: 0 0 30px rgba(232,200,74,0.4);
    }
    .logo span { color: var(--accent2); }
    .header-right { display: flex; align-items: center; gap: 1rem; }
    .video-count {
      font-size: 0.8rem;
      color: var(--muted);
      background: var(--surface);
      padding: 4px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
    }

    /* ─── UPLOAD ZONE ─── */
    .upload-section {
      padding: 2rem 2rem 1rem;
    }
    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: 16px;
      padding: 2.5rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      background: var(--surface);
      position: relative;
      overflow: hidden;
    }
    .upload-zone::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, rgba(232,200,74,0.04) 0%, transparent 70%);
      pointer-events: none;
    }
    .upload-zone:hover, .upload-zone.drag-over {
      border-color: var(--accent);
      background: rgba(232,200,74,0.05);
      transform: scale(1.005);
    }
    .upload-icon {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
    }
    .upload-zone h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      letter-spacing: 1px;
      color: var(--text);
      margin-bottom: 0.3rem;
    }
    .upload-zone p {
      color: var(--muted);
      font-size: 0.875rem;
    }
    .upload-zone p strong { color: var(--accent); }
    #fileInput { display: none; }

    /* ─── PROGRESS ─── */
    .upload-progress {
      display: none;
      margin-top: 1rem;
      background: var(--surface);
      border-radius: 12px;
      padding: 1rem 1.5rem;
      border: 1px solid var(--border);
    }
    .upload-progress.active { display: block; }
    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      margin-bottom: 0.5rem;
      color: var(--muted);
    }
    .progress-label span:last-child { color: var(--accent); font-weight: 600; }
    .progress-bar-bg {
      height: 6px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 99px;
      width: 0%;
      transition: width 0.2s ease;
    }

    /* ─── LIBRARY ─── */
    .library-section {
      padding: 1rem 2rem 4rem;
    }
    .section-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }
    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .empty-state {
      text-align: center;
      padding: 5rem 2rem;
      color: var(--muted);
    }
    .empty-state .big-icon { font-size: 4rem; margin-bottom: 1rem; opacity: 0.3; }
    .empty-state p { font-size: 1rem; }

    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1.2rem;
    }

    .video-card {
      background: var(--card);
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.25s ease;
      position: relative;
    }
    .video-card:hover {
      border-color: var(--accent);
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(232,200,74,0.1);
    }
    .video-thumb {
      position: relative;
      width: 100%;
      padding-top: 56.25%;
      background: #0d0d18;
      overflow: hidden;
    }
    .video-thumb video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .thumb-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .video-card:hover .thumb-overlay { opacity: 1; }
    .play-btn-overlay {
      width: 48px;
      height: 48px;
      background: var(--accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #000;
      font-size: 1.2rem;
    }
    .video-info {
      padding: 0.8rem 1rem;
    }
    .video-title {
      font-size: 0.9rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 0.25rem;
    }
    .video-meta {
      font-size: 0.75rem;
      color: var(--muted);
    }
    .delete-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 28px;
      height: 28px;
      background: rgba(0,0,0,0.7);
      border: none;
      border-radius: 50%;
      color: #fff;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      z-index: 5;
      transition: background 0.2s;
    }
    .video-card:hover .delete-btn { display: flex; }
    .delete-btn:hover { background: #e63946; }

    /* ─── PLAYER MODAL ─── */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--overlay);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .modal-backdrop.open { display: flex; }

    .player-container {
      width: 100%;
      max-width: 960px;
      background: #000;
      border-radius: 16px;
      overflow: hidden;
      position: relative;
      border: 1px solid var(--border);
      box-shadow: 0 40px 120px rgba(0,0,0,0.8);
    }

    .player-close {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 20;
      background: rgba(0,0,0,0.6);
      border: none;
      color: #fff;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    .player-close:hover { background: #e63946; }

    .player-title {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 20;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 1px;
      color: #fff;
      text-shadow: 0 2px 8px rgba(0,0,0,0.8);
      max-width: calc(100% - 80px);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #mainVideo {
      width: 100%;
      display: block;
      max-height: 70vh;
      background: #000;
    }

    /* ─── CUSTOM CONTROLS ─── */
    .controls {
      background: linear-gradient(0deg, #000 0%, rgba(0,0,0,0.9) 100%);
      padding: 0.6rem 1rem 0.8rem;
    }

    /* Progress */
    .progress-area {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 0.6rem;
    }
    .time-label {
      font-size: 0.78rem;
      color: var(--muted);
      white-space: nowrap;
      min-width: 42px;
    }
    .seek-bar {
      flex: 1;
      -webkit-appearance: none;
      height: 4px;
      background: #333;
      border-radius: 99px;
      outline: none;
      cursor: pointer;
      transition: height 0.15s;
    }
    .seek-bar:hover { height: 6px; }
    .seek-bar::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
    }

    /* Buttons row */
    .controls-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .ctrl-btn {
      background: none;
      border: none;
      color: #fff;
      cursor: pointer;
      padding: 6px 8px;
      border-radius: 8px;
      font-size: 1rem;
      transition: background 0.15s, color 0.15s;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .ctrl-btn:hover { background: rgba(255,255,255,0.1); }
    .ctrl-btn.active { color: var(--accent); }

    /* Volume */
    .volume-group {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .vol-slider {
      -webkit-appearance: none;
      width: 80px;
      height: 4px;
      background: #333;
      border-radius: 99px;
      outline: none;
      cursor: pointer;
    }
    .vol-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
    }

    .spacer { flex: 1; }

    /* Speed select */
    .speed-select {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      color: #fff;
      border-radius: 6px;
      padding: 3px 6px;
      font-size: 0.78rem;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
    }
    .speed-select option { background: #111; }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 600px) {
      header { padding: 0 1rem; }
      .upload-section, .library-section { padding-left: 1rem; padding-right: 1rem; }
      .video-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
      .vol-slider { width: 60px; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="logo">Cine<span>Vault</span></div>
    <div class="header-right">
      <div class="video-count" id="videoCount">0 vídeos</div>
    </div>
  </header>

  <!-- UPLOAD -->
  <div class="upload-section">
    <div class="upload-zone" id="uploadZone">
      <div class="upload-icon">🎬</div>
      <h2>Solte seus vídeos aqui</h2>
      <p>ou <strong>clique para selecionar</strong> arquivos do seu computador</p>
      <p style="margin-top:0.5rem; font-size:0.8rem;">Suporta MP4, MKV, AVI, MOV, WebM e mais</p>
      <input type="file" id="fileInput" accept="video/*" multiple />
    </div>
    <div class="upload-progress" id="uploadProgress">
      <div class="progress-label">
        <span id="progressName">Carregando...</span>
        <span id="progressPct">0%</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progressFill"></div>
      </div>
    </div>
  </div>

  <!-- LIBRARY -->
  <div class="library-section">
    <div class="section-title">Biblioteca</div>
    <div id="emptyState" class="empty-state">
      <div class="big-icon">📂</div>
      <p>Nenhum vídeo ainda. Faça o upload acima!</p>
    </div>
    <div class="video-grid" id="videoGrid"></div>
  </div>

  <!-- PLAYER MODAL -->
  <div class="modal-backdrop" id="modalBackdrop">
    <div class="player-container" id="playerContainer">
      <div class="player-title" id="playerTitle"></div>
      <button class="player-close" id="playerClose" title="Fechar">✕</button>

      <video id="mainVideo" preload="metadata"></video>

      <div class="controls">
        <!-- Barra de progresso -->
        <div class="progress-area">
          <span class="time-label" id="currentTime">0:00</span>
          <input type="range" class="seek-bar" id="seekBar" value="0" min="0" step="0.1" />
          <span class="time-label" id="duration">0:00</span>
        </div>

        <!-- Botões -->
        <div class="controls-row">
          <!-- Play/Pause -->
          <button class="ctrl-btn" id="playPauseBtn" title="Play/Pause">▶</button>

          <!-- Retroceder 10s -->
          <button class="ctrl-btn" id="rewind10" title="-10s">⏪</button>

          <!-- Avançar 10s -->
          <button class="ctrl-btn" id="forward10" title="+10s">⏩</button>

          <!-- Volume -->
          <div class="volume-group">
            <button class="ctrl-btn" id="muteBtn" title="Mudo">🔊</button>
            <input type="range" class="vol-slider" id="volSlider" min="0" max="1" step="0.02" value="1" />
          </div>

          <div class="spacer"></div>

          <!-- Velocidade -->
          <select class="speed-select" id="speedSelect" title="Velocidade">
            <option value="0.5">0.5×</option>
            <option value="0.75">0.75×</option>
            <option value="1" selected>1×</option>
            <option value="1.25">1.25×</option>
            <option value="1.5">1.5×</option>
            <option value="2">2×</option>
          </select>

          <!-- Tela cheia -->
          <button class="ctrl-btn" id="fullscreenBtn" title="Tela cheia">⛶</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ─── STATE ─────────────────────────────────────────────────────────────
    let videos = JSON.parse(localStorage.getItem('cinevault_videos') || '[]');
    // videos = [{ id, name, size, type, dataUrl, addedAt }]

    // ─── ELEMENTS ──────────────────────────────────────────────────────────
    const uploadZone = document.getElementById('uploadZone');
    const fileInput = document.getElementById('fileInput');
    const videoGrid = document.getElementById('videoGrid');
    const emptyState = document.getElementById('emptyState');
    const videoCount = document.getElementById('videoCount');
    const uploadProgress = document.getElementById('uploadProgress');
    const progressFill = document.getElementById('progressFill');
    const progressName = document.getElementById('progressName');
    const progressPct = document.getElementById('progressPct');

    const modal = document.getElementById('modalBackdrop');
    const mainVideo = document.getElementById('mainVideo');
    const playerTitle = document.getElementById('playerTitle');
    const playerClose = document.getElementById('playerClose');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const seekBar = document.getElementById('seekBar');
    const currentTimeEl = document.getElementById('currentTime');
    const durationEl = document.getElementById('duration');
    const volSlider = document.getElementById('volSlider');
    const muteBtn = document.getElementById('muteBtn');
    const speedSelect = document.getElementById('speedSelect');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    const rewind10 = document.getElementById('rewind10');
    const forward10 = document.getElementById('forward10');

    // ─── RENDER ────────────────────────────────────────────────────────────
    function renderLibrary() {
      videoGrid.innerHTML = '';
      const count = videos.length;
      videoCount.textContent = `${count} vídeo${count !== 1 ? 's' : ''}`;

      if (count === 0) {
        emptyState.style.display = 'block';
        return;
      }
      emptyState.style.display = 'none';

      videos.forEach(v => {
        const card = document.createElement('div');
        card.className = 'video-card';
        card.innerHTML = `
          <div class="video-thumb">
            <video src="${v.dataUrl}" muted preload="metadata"></video>
            <div class="thumb-overlay">
              <div class="play-btn-overlay">▶</div>
            </div>
          </div>
          <div class="video-info">
            <div class="video-title">${v.name}</div>
            <div class="video-meta">${formatSize(v.size)}</div>
          </div>
          <button class="delete-btn" data-id="${v.id}" title="Remover">✕</button>
        `;
        card.addEventListener('click', (e) => {
          if (e.target.classList.contains('delete-btn') || e.target.closest('.delete-btn')) return;
          openPlayer(v);
        });
        card.querySelector('.delete-btn').addEventListener('click', (e) => {
          e.stopPropagation();
          deleteVideo(v.id);
        });
        videoGrid.appendChild(card);
      });
    }

    function saveAndRender() {
      localStorage.setItem('cinevault_videos', JSON.stringify(videos));
      renderLibrary();
    }

    function formatSize(bytes) {
      if (bytes > 1073741824) return (bytes / 1073741824).toFixed(1) + ' GB';
      if (bytes > 1048576) return (bytes / 1048576).toFixed(1) + ' MB';
      return (bytes / 1024).toFixed(0) + ' KB';
    }

    function formatTime(secs) {
      if (isNaN(secs)) return '0:00';
      const m = Math.floor(secs / 60);
      const s = Math.floor(secs % 60).toString().padStart(2, '0');
      return `${m}:${s}`;
    }

    // ─── UPLOAD ────────────────────────────────────────────────────────────
    uploadZone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', e => handleFiles(e.target.files));

    uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
    uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
    uploadZone.addEventListener('drop', e => {
      e.preventDefault();
      uploadZone.classList.remove('drag-over');
      handleFiles(e.dataTransfer.files);
    });

    async function handleFiles(files) {
      for (const file of files) {
        if (!file.type.startsWith('video/')) continue;
        await loadVideoFile(file);
      }
    }

    function loadVideoFile(file) {
      return new Promise(resolve => {
        uploadProgress.classList.add('active');
        progressName.textContent = file.name;

        const reader = new FileReader();
        reader.onprogress = e => {
          if (e.lengthComputable) {
            const pct = Math.round((e.loaded / e.total) * 100);
            progressFill.style.width = pct + '%';
            progressPct.textContent = pct + '%';
          }
        };
        reader.onload = e => {
          const id = Date.now() + Math.random().toString(36).slice(2);
          videos.unshift({
            id,
            name: file.name.replace(/\.[^/.]+$/, ''),
            size: file.size,
            type: file.type,
            dataUrl: e.target.result,
            addedAt: new Date().toISOString()
          });
          saveAndRender();
          progressFill.style.width = '0%';
          uploadProgress.classList.remove('active');
          fileInput.value = '';
          resolve();
        };
        reader.readAsDataURL(file);
      });
    }

    // ─── DELETE ────────────────────────────────────────────────────────────
    function deleteVideo(id) {
      if (!confirm('Remover este vídeo da biblioteca?')) return;
      videos = videos.filter(v => v.id !== id);
      saveAndRender();
    }

    // ─── PLAYER ────────────────────────────────────────────────────────────
    function openPlayer(v) {
      mainVideo.src = v.dataUrl;
      playerTitle.textContent = v.name;
      modal.classList.add('open');
      mainVideo.play();
    }

    function closePlayer() {
      mainVideo.pause();
      mainVideo.src = '';
      modal.classList.remove('open');
    }

    playerClose.addEventListener('click', closePlayer);
    modal.addEventListener('click', e => { if (e.target === modal) closePlayer(); });

    // Keyboard shortcuts
    document.addEventListener('keydown', e => {
      if (!modal.classList.contains('open')) return;
      if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
      if (e.code === 'Escape') closePlayer();
      if (e.code === 'ArrowLeft') mainVideo.currentTime = Math.max(0, mainVideo.currentTime - 10);
      if (e.code === 'ArrowRight') mainVideo.currentTime = Math.min(mainVideo.duration, mainVideo.currentTime + 10);
      if (e.code === 'KeyF') toggleFullscreen();
      if (e.code === 'KeyM') toggleMute();
    });

    function togglePlay() {
      if (mainVideo.paused) { mainVideo.play(); } else { mainVideo.pause(); }
    }

    mainVideo.addEventListener('play', () => { playPauseBtn.textContent = '⏸'; });
    mainVideo.addEventListener('pause', () => { playPauseBtn.textContent = '▶'; });
    playPauseBtn.addEventListener('click', togglePlay);
    mainVideo.addEventListener('click', togglePlay);

    // Seek
    mainVideo.addEventListener('timeupdate', () => {
      if (!mainVideo.duration) return;
      seekBar.value = (mainVideo.currentTime / mainVideo.duration) * 100;
      currentTimeEl.textContent = formatTime(mainVideo.currentTime);
    });
    mainVideo.addEventListener('loadedmetadata', () => {
      seekBar.max = 100;
      durationEl.textContent = formatTime(mainVideo.duration);
    });
    seekBar.addEventListener('input', () => {
      mainVideo.currentTime = (seekBar.value / 100) * mainVideo.duration;
    });

    // Volume
    volSlider.addEventListener('input', () => {
      mainVideo.volume = volSlider.value;
      mainVideo.muted = false;
      updateMuteIcon();
    });
    function toggleMute() {
      mainVideo.muted = !mainVideo.muted;
      updateMuteIcon();
    }
    function updateMuteIcon() {
      if (mainVideo.muted || mainVideo.volume === 0) {
        muteBtn.textContent = '🔇';
      } else if (mainVideo.volume < 0.5) {
        muteBtn.textContent = '🔉';
      } else {
        muteBtn.textContent = '🔊';
      }
    }
    muteBtn.addEventListener('click', toggleMute);

    // Speed
    speedSelect.addEventListener('change', () => {
      mainVideo.playbackRate = parseFloat(speedSelect.value);
    });

    // +/- 10s
    rewind10.addEventListener('click', () => mainVideo.currentTime = Math.max(0, mainVideo.currentTime - 10));
    forward10.addEventListener('click', () => mainVideo.currentTime = Math.min(mainVideo.duration, mainVideo.currentTime + 10));

    // Fullscreen
    function toggleFullscreen() {
      const el = document.getElementById('playerContainer');
      if (!document.fullscreenElement) {
        el.requestFullscreen && el.requestFullscreen();
        fullscreenBtn.textContent = '⊡';
      } else {
        document.exitFullscreen && document.exitFullscreen();
        fullscreenBtn.textContent = '⛶';
      }
    }
    fullscreenBtn.addEventListener('click', toggleFullscreen);
    document.addEventListener('fullscreenchange', () => {
      fullscreenBtn.textContent = document.fullscreenElement ? '⊡' : '⛶';
    });

    // ─── INIT ──────────────────────────────────────────────────────────────
    renderLibrary();
  </script>
</body>
</html>
