<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CineVault — Sua Biblioteca de Vídeos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0f; --surface: #13131a; --card: #1a1a24; --border: #2a2a38;
      --accent: #e8c84a; --accent2: #ff6b35; --text: #f0f0f8; --muted: #888899;
      --overlay: rgba(10,10,15,0.92);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }
    header { position: sticky; top: 0; z-index: 100; background: rgba(10,10,15,0.85); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); padding: 0 2rem; height: 64px; display: flex; align-items: center; justify-content: space-between; }
    .logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: 2px; color: var(--accent); text-shadow: 0 0 30px rgba(232,200,74,0.4); }
    .logo span { color: var(--accent2); }
    .video-count { font-size: 0.8rem; color: var(--muted); background: var(--surface); padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border); }
    .upload-section { padding: 2rem 2rem 1rem; }
    .upload-zone { border: 2px dashed var(--border); border-radius: 16px; padding: 2.5rem; text-align: center; cursor: pointer; transition: all 0.3s ease; background: var(--surface); position: relative; overflow: hidden; }
    .upload-zone::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at center, rgba(232,200,74,0.04) 0%, transparent 70%); pointer-events: none; }
    .upload-zone:hover, .upload-zone.drag-over { border-color: var(--accent); background: rgba(232,200,74,0.05); transform: scale(1.005); }
    .upload-zone h2 { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; letter-spacing: 1px; margin-bottom: 0.3rem; }
    .upload-zone p { color: var(--muted); font-size: 0.875rem; }
    .upload-zone p strong { color: var(--accent); }
    #fileInput { display: none; }
    .upload-progress { display: none; margin-top: 1rem; background: var(--surface); border-radius: 12px; padding: 1rem 1.5rem; border: 1px solid var(--border); }
    .upload-progress.active { display: block; }
    .progress-label { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 0.5rem; color: var(--muted); }
    .progress-label span:last-child { color: var(--accent); font-weight: 600; }
    .progress-bar-bg { height: 6px; background: var(--border); border-radius: 99px; overflow: hidden; }
    .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 99px; width: 0%; transition: width 0.2s ease; }
    .library-section { padding: 1rem 2rem 4rem; }
    .section-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 1.2rem; display: flex; align-items: center; gap: 0.8rem; }
    .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .empty-state { text-align: center; padding: 5rem 2rem; color: var(--muted); }
    .empty-state .big-icon { font-size: 4rem; margin-bottom: 1rem; opacity: 0.3; }
    .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1.2rem; }
    .video-card { background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); cursor: pointer; transition: all 0.25s ease; position: relative; }
    .video-card:hover { border-color: var(--accent); transform: translateY(-4px); box-shadow: 0 12px 40px rgba(232,200,74,0.1); }
    .video-thumb { position: relative; width: 100%; padding-top: 56.25%; background: #0d0d18; overflow: hidden; }
    .video-thumb video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
    .thumb-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.35); display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s; }
    .video-card:hover .thumb-overlay { opacity: 1; }
    .play-btn-overlay { width: 48px; height: 48px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #000; font-size: 1.2rem; }
    .video-info { padding: 0.8rem 1rem; }
    .video-title { font-size: 0.9rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 0.25rem; }
    .video-meta { font-size: 0.75rem; color: var(--muted); }
    .delete-btn { position: absolute; top: 8px; right: 8px; width: 28px; height: 28px; background: rgba(0,0,0,0.7); border: none; border-radius: 50%; color: #fff; cursor: pointer; display: none; align-items: center; justify-content: center; font-size: 0.7rem; z-index: 5; transition: background 0.2s; }
    .video-card:hover .delete-btn { display: flex; }
    .delete-btn:hover { background: #e63946; }
    .modal-backdrop { display: none; position: fixed; inset: 0; background: var(--overlay); z-index: 1000; align-items: center; justify-content: center; padding: 1rem; }
    .modal-backdrop.open { display: flex; }
    .player-container { width: 100%; max-width: 960px; background: #000; border-radius: 16px; overflow: hidden; position: relative; border: 1px solid var(--border); box-shadow: 0 40px 120px rgba(0,0,0,0.8); }
    .player-close { position: absolute; top: 12px; right: 12px; z-index: 20; background: rgba(0,0,0,0.6); border: none; color: #fff; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
    .player-close:hover { background: #e63946; }
    .player-title { position: absolute; top: 12px; left: 12px; z-index: 20; font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; letter-spacing: 1px; color: #fff; text-shadow: 0 2px 8px rgba(0,0,0,0.8); max-width: calc(100% - 80px); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #mainVideo { width: 100%; display: block; max-height: 70vh; background: #000; }
    .controls { background: linear-gradient(0deg, #000 0%, rgba(0,0,0,0.9) 100%); padding: 0.6rem 1rem 0.8rem; }
    .progress-area { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.6rem; }
    .time-label { font-size: 0.78rem; color: var(--muted); white-space: nowrap; min-width: 42px; }
    .seek-bar { flex: 1; -webkit-appearance: none; height: 4px; background: #333; border-radius: 99px; outline: none; cursor: pointer; }
    .seek-bar:hover { height: 6px; }
    .seek-bar::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: var(--accent); cursor: pointer; }
    .controls-row { display: flex; align-items: center; gap: 0.5rem; }
    .ctrl-btn { background: none; border: none; color: #fff; cursor: pointer; padding: 6px 8px; border-radius: 8px; font-size: 1rem; transition: background 0.15s; display: flex; align-items: center; }
    .ctrl-btn:hover { background: rgba(255,255,255,0.1); }
    .volume-group { display: flex; align-items: center; gap: 0.4rem; }
    .vol-slider { -webkit-appearance: none; width: 80px; height: 4px; background: #333; border-radius: 99px; outline: none; cursor: pointer; }
    .vol-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: var(--accent); cursor: pointer; }
    .spacer { flex: 1; }
    .speed-select { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); color: #fff; border-radius: 6px; padding: 3px 6px; font-size: 0.78rem; cursor: pointer; font-family: 'DM Sans', sans-serif; }
    .speed-select option { background: #111; }
    @media (max-width: 600px) {
      header { padding: 0 1rem; }
      .upload-section, .library-section { padding-left: 1rem; padding-right: 1rem; }
      .video-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
      .vol-slider { width: 60px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">Cine<span>Vault</span></div>
    <div class="video-count" id="videoCount">0 vídeos</div>
  </header>

  <div class="upload-section">
    <div class="upload-zone" id="uploadZone">
      <div style="font-size:2.5rem;margin-bottom:0.5rem">🎬</div>
      <h2>Solte seus vídeos aqui</h2>
      <p>ou <strong>clique para selecionar</strong> arquivos do seu computador</p>
      <p style="margin-top:0.5rem;font-size:0.8rem;">Suporta MP4, MKV, AVI, MOV, WebM e mais</p>
      <input type="file" id="fileInput" accept="video/*" multiple />
    </div>
    <div class="upload-progress" id="uploadProgress">
      <div class="progress-label">
        <span id="progressName">Enviando...</span>
        <span id="progressPct">0%</span>
      </div>
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill"></div></div>
    </div>
  </div>

  <div class="library-section">
    <div class="section-title">Biblioteca</div>
    <div id="emptyState" class="empty-state">
      <div class="big-icon">📂</div>
      <p>Nenhum vídeo ainda. Faça o upload acima!</p>
    </div>
    <div class="video-grid" id="videoGrid"></div>
  </div>

  <div class="modal-backdrop" id="modalBackdrop">
    <div class="player-container" id="playerContainer">
      <div class="player-title" id="playerTitle"></div>
      <button class="player-close" id="playerClose">✕</button>
      <video id="mainVideo" preload="metadata"></video>
      <div class="controls">
        <div class="progress-area">
          <span class="time-label" id="currentTime">0:00</span>
          <input type="range" class="seek-bar" id="seekBar" value="0" min="0" step="0.1" />
          <span class="time-label" id="duration">0:00</span>
        </div>
        <div class="controls-row">
          <button class="ctrl-btn" id="playPauseBtn">▶</button>
          <button class="ctrl-btn" id="rewind10">⏪</button>
          <button class="ctrl-btn" id="forward10">⏩</button>
          <div class="volume-group">
            <button class="ctrl-btn" id="muteBtn">🔊</button>
            <input type="range" class="vol-slider" id="volSlider" min="0" max="1" step="0.02" value="1" />
          </div>
          <div class="spacer"></div>
          <select class="speed-select" id="speedSelect">
            <option value="0.5">0.5×</option>
            <option value="0.75">0.75×</option>
            <option value="1" selected>1×</option>
            <option value="1.25">1.25×</option>
            <option value="1.5">1.5×</option>
            <option value="2">2×</option>
          </select>
          <button class="ctrl-btn" id="fullscreenBtn">⛶</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const $ = id => document.getElementById(id);
    const uploadZone = $('uploadZone'), fileInput = $('fileInput'), videoGrid = $('videoGrid');
    const emptyState = $('emptyState'), videoCount = $('videoCount');
    const uploadProgress = $('uploadProgress'), progressFill = $('progressFill');
    const progressName = $('progressName'), progressPct = $('progressPct');
    const modal = $('modalBackdrop'), mainVideo = $('mainVideo');
    const playerTitle = $('playerTitle'), seekBar = $('seekBar');
    const currentTimeEl = $('currentTime'), durationEl = $('duration');
    const volSlider = $('volSlider'), muteBtn = $('muteBtn');
    const speedSelect = $('speedSelect'), fullscreenBtn = $('fullscreenBtn');
    const playPauseBtn = $('playPauseBtn');

    const fmtSize = b => b > 1073741824 ? (b/1073741824).toFixed(1)+' GB' : b > 1048576 ? (b/1048576).toFixed(1)+' MB' : (b/1024).toFixed(0)+' KB';
    const fmtTime = s => isNaN(s) ? '0:00' : Math.floor(s/60)+':'+Math.floor(s%60).toString().padStart(2,'0');

    async function loadLibrary() {
      const list = await fetch('/videos').then(r => r.json());
      videoGrid.innerHTML = '';
      videoCount.textContent = `${list.length} vídeo${list.length !== 1 ? 's' : ''}`;
      emptyState.style.display = list.length === 0 ? 'block' : 'none';
      list.forEach(v => {
        const card = document.createElement('div');
        card.className = 'video-card';
        card.innerHTML = `
          <div class="video-thumb">
            <video src="${v.url}#t=3" muted preload="metadata"></video>
            <div class="thumb-overlay"><div class="play-btn-overlay">▶</div></div>
          </div>
          <div class="video-info">
            <div class="video-title">${v.name}</div>
            <div class="video-meta">${fmtSize(v.size)}</div>
          </div>
          <button class="delete-btn" title="Remover">✕</button>`;
        card.addEventListener('click', e => { if (!e.target.classList.contains('delete-btn')) openPlayer(v); });
        card.querySelector('.delete-btn').addEventListener('click', async e => {
          e.stopPropagation();
          if (!confirm('Remover este vídeo?')) return;
          await fetch('/video/' + v.id, { method: 'DELETE' });
          loadLibrary();
        });
        videoGrid.appendChild(card);
      });
    }

    uploadZone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', e => handleFiles(e.target.files));
    uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
    uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
    uploadZone.addEventListener('drop', e => { e.preventDefault(); uploadZone.classList.remove('drag-over'); handleFiles(e.dataTransfer.files); });

    async function handleFiles(files) {
      for (const f of files) { if (f.type.startsWith('video/')) await uploadFile(f); }
      loadLibrary();
    }

    function uploadFile(file) {
      return new Promise((resolve, reject) => {
        uploadProgress.classList.add('active');
        progressName.textContent = file.name;
        progressFill.style.width = '0%';
        progressPct.textContent = '0%';
        const xhr = new XMLHttpRequest();
        xhr.open('POST', '/upload');
        xhr.upload.onprogress = e => {
          if (e.lengthComputable) {
            const p = Math.round(e.loaded / e.total * 100);
            progressFill.style.width = p + '%';
            progressPct.textContent = p + '%';
          }
        };
        xhr.onload = () => { uploadProgress.classList.remove('active'); fileInput.value = ''; resolve(); };
        xhr.onerror = () => { uploadProgress.classList.remove('active'); reject(); };
        const form = new FormData();
        form.append('video', file);
        xhr.send(form);
      });
    }

    function openPlayer(v) { mainVideo.src = v.url; playerTitle.textContent = v.name; modal.classList.add('open'); mainVideo.play(); }
    function closePlayer() { mainVideo.pause(); mainVideo.src = ''; modal.classList.remove('open'); }
    $('playerClose').addEventListener('click', closePlayer);
    modal.addEventListener('click', e => { if (e.target === modal) closePlayer(); });

    document.addEventListener('keydown', e => {
      if (!modal.classList.contains('open')) return;
      if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
      if (e.code === 'Escape') closePlayer();
      if (e.code === 'ArrowLeft') mainVideo.currentTime = Math.max(0, mainVideo.currentTime - 10);
      if (e.code === 'ArrowRight') mainVideo.currentTime = Math.min(mainVideo.duration, mainVideo.currentTime + 10);
      if (e.code === 'KeyF') toggleFullscreen();
      if (e.code === 'KeyM') toggleMute();
    });

    function togglePlay() { mainVideo.paused ? mainVideo.play() : mainVideo.pause(); }
    mainVideo.addEventListener('play', () => playPauseBtn.textContent = '⏸');
    mainVideo.addEventListener('pause', () => playPauseBtn.textContent = '▶');
    playPauseBtn.addEventListener('click', togglePlay);
    mainVideo.addEventListener('click', togglePlay);
    mainVideo.addEventListener('timeupdate', () => { if (!mainVideo.duration) return; seekBar.value = mainVideo.currentTime / mainVideo.duration * 100; currentTimeEl.textContent = fmtTime(mainVideo.currentTime); });
    mainVideo.addEventListener('loadedmetadata', () => { seekBar.max = 100; durationEl.textContent = fmtTime(mainVideo.duration); });
    seekBar.addEventListener('input', () => { mainVideo.currentTime = seekBar.value / 100 * mainVideo.duration; });
    volSlider.addEventListener('input', () => { mainVideo.volume = volSlider.value; mainVideo.muted = false; updateMuteIcon(); });
    function toggleMute() { mainVideo.muted = !mainVideo.muted; updateMuteIcon(); }
    function updateMuteIcon() { muteBtn.textContent = (mainVideo.muted || mainVideo.volume === 0) ? '🔇' : mainVideo.volume < 0.5 ? '🔉' : '🔊'; }
    muteBtn.addEventListener('click', toggleMute);
    speedSelect.addEventListener('change', () => { mainVideo.playbackRate = parseFloat(speedSelect.value); });
    $('rewind10').addEventListener('click', () => mainVideo.currentTime = Math.max(0, mainVideo.currentTime - 10));
    $('forward10').addEventListener('click', () => mainVideo.currentTime = Math.min(mainVideo.duration, mainVideo.currentTime + 10));
    function toggleFullscreen() {
      const el = $('playerContainer');
      if (!document.fullscreenElement) { el.requestFullscreen(); fullscreenBtn.textContent = '⊡'; }
      else { document.exitFullscreen(); fullscreenBtn.textContent = '⛶'; }
    }
    fullscreenBtn.addEventListener('click', toggleFullscreen);
    document.addEventListener('fullscreenchange', () => { fullscreenBtn.textContent = document.fullscreenElement ? '⊡' : '⛶'; });

    loadLibrary();
  </script>
</body>
</html>
